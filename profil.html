<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlowGloss - User Profile</title>
    <!-- Google Fonts & Font Awesome Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-primary: #fcf8f7;
            --bg-card: #ffffff;
            --accent-pink: #f3d1cb;
            --text-dark: #2d2422;
            --text-muted: #8c7e7c;
            --pure-white: #ffffff;
            --rose-gold: #d4a373;
            --border-color: #f1eae7;
            --shadow: 0 4px 20px rgba(243, 209, 203, 0.15);
            --radius: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .profile-container {
            width: 100%;
            max-width: 900px;
            background-color: var(--bg-card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid rgba(243, 209, 203, 0.2);
            overflow: hidden;
            display: grid;
            grid-template-columns: 320px 1fr;
        }

        /* --- LEFT COLUMN: AVATAR & QUICK INFO --- */
        .profile-sidebar {
            background-color: #fff9f8;
            border-right: 1px solid var(--border-color);
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .avatar-wrapper {
            position: relative;
            margin-bottom: 24px;
        }

        .profile-avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--pure-white);
            box-shadow: 0 4px 15px rgba(212, 163, 115, 0.2);
        }

        .upload-btn {
            position: absolute;
            bottom: 4px;
            right: 4px;
            background-color: var(--rose-gold);
            color: var(--pure-white);
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid var(--pure-white);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .upload-btn:hover {
            transform: scale(1.1);
        }

        .profile-sidebar h2 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .profile-sidebar .role {
            font-size: 13px;
            color: var(--rose-gold);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 30px;
        }

        .quick-stats {
            width: 100%;
            border-top: 1px solid var(--border-color);
            padding-top: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-muted);
            font-size: 14px;
        }

        .stat-item i {
            color: var(--rose-gold);
            width: 20px;
        }

        /* --- RIGHT COLUMN: DETAILED FORM --- */
        .profile-content {
            padding: 40px;
        }

        .content-header {
            margin-bottom: 32px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 16px;
        }

        .content-header h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .content-header p {
            font-size: 13px;
            color: var(--text-muted);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-primary);
            border-radius: 10px;
            font-size: 14px;
            color: var(--text-dark);
            outline: none;
            transition: all 0.3s ease;
        }

        .form-group input:focus, .form-group textarea:focus {
            border-color: var(--rose-gold);
            background-color: var(--pure-white);
            box-shadow: 0 0 0 3px rgba(212, 163, 115, 0.1);
        }

        .form-group textarea {
            resize: none;
            height: 100px;
        }

        /* --- BUTTONS --- */
        .action-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .btn {
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
        }

        .btn-secondary {
            background-color: var(--bg-primary);
            color: var(--text-muted);
        }

        .btn-secondary:hover {
            background-color: var(--border-color);
            color: var(--text-dark);
        }

        .btn-primary {
            background-color: var(--rose-gold);
            color: var(--pure-white);
            box-shadow: 0 4px 12px rgba(212, 163, 115, 0.2);
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .profile-container {
                grid-template-columns: 1fr;
            }
            .profile-sidebar {
                border-right: none;
                border-bottom: 1px solid var(--border-color);
            }
            .form-grid {
                grid-template-columns: 1fr;
            }
            .form-group.full-width {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <!-- SIDEBAR INFO -->
        <div class="profile-sidebar">
            <div class="avatar-wrapper">
                <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=150&q=80" alt="Avatar" class="profile-avatar" id="avatarImage">
                <label for="avatarInput" class="upload-btn">
                    <i class="fa-solid fa-camera"></i>
                </label>
                <input type="file" id="avatarInput" accept="image/*" style="display: none;">
            </div>

            <h2 id="sidebarName">Sarah Jenkins</h2>
            <div class="role">Beauty Consultant</div>

            <div class="quick-stats">
                <div class="stat-item">
                    <i class="fa-regular fa-envelope"></i>
                    <span id="sidebarEmail">sarah.j@glowgloss.com</span>
                </div>
                <div class="stat-item">
                    <i class="fa-solid fa-phone"></i>
                    <span>+62 812-3456-7890</span>
                </div>
                <div class="stat-item">
                    <i class="fa-solid fa-location-dot"></i>
                    <span>Magelang, Central Java</span>
                </div>
            </div>
        </div>

        <!-- FORM EDIT PROFILE -->
        <div class="profile-content">
            <div class="content-header">
                <h3>Account Settings</h3>
                <p>Update your profile details and personal information below.</p>
            </div>

            <form id="profileForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="fullName">Full Name</label>
                        <input type="text" id="fullName" value="Sarah Jenkins">
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" value="sarah.j@glowgloss.com">
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" value="+62 812-3456-7890">
                    </div>

                    <div class="form-group">
                        <label for="location">Location</label>
                        <input type="text" id="location" value="Magelang, Central Java">
                    </div>

                    <div class="form-group full-width">
                        <label for="bio">Bio / Professional Summary</label>
                        <textarea id="bio">Passionate skin health consultant and beauty enthusiast with over 4 years of experience helping clients achieve their ideal glow.</textarea>
                    </div>
                </div>

                <div class="action-buttons">
                    <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <!-- JAVASCRIPT FOR REAL-TIME UPDATE & INTERACTION -->
    <script>
        // Preview avatar upload
        const avatarInput = document.getElementById('avatarInput');
        const avatarImage = document.getElementById('avatarImage');

        avatarInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    avatarImage.setAttribute('src', e.target.result);
                }
                reader.readAsDataURL(file);
            }
        });

        // Handle form submission and dynamic update to sidebar
        const profileForm = document.getElementById('profileForm');
        const fullNameInput = document.getElementById('fullName');
        const emailInput = document.getElementById('email');
        const sidebarName = document.getElementById('sidebarName');
        const sidebarEmail = document.getElementById('sidebarEmail');

        profileForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Perbarui data teks di sisi kiri secara real-time
            sidebarName.textContent = fullNameInput.value;
            sidebarEmail.textContent = emailInput.value;

            alert('Profile updated successfully!');
        });

        // Reset data on click cancel
        document.getElementById('cancelBtn').addEventListener('click', function() {
            if (confirm('Discard changes?')) {
                profileForm.reset();
                // Kembalikan ke teks bawaan form
                sidebarName.textContent = fullNameInput.value;
                sidebarEmail.textContent = emailInput.value;
            }
        });
    </script>
</body>
</html>
